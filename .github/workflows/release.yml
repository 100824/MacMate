name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: ./scripts/run_tests.sh

      - name: Build DMG
        run: ./scripts/package_dmg.sh

      - name: Verify DMG
        run: |
          hdiutil verify dist/MacMate-1.0.0-arm64.dmg
          shasum -a 256 dist/MacMate-1.0.0-arm64.dmg | tee dist/MacMate-1.0.0-arm64.dmg.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacMate-1.0.0-arm64
          path: |
            dist/MacMate-1.0.0-arm64.dmg
            dist/MacMate-1.0.0-arm64.dmg.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/MacMate-1.0.0-arm64.dmg dist/MacMate-1.0.0-arm64.dmg.sha256 --clobber
          else
            gh release create "$TAG_NAME" dist/MacMate-1.0.0-arm64.dmg dist/MacMate-1.0.0-arm64.dmg.sha256 --generate-notes
          fi
